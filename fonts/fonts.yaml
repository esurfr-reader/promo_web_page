# Surf Reader — temporary font picker catalogue
# ---------------------------------------------------------
# Two pulldowns appear in the top-left of the page so the
# client can preview different combinations of title +
# subtitle fonts before locking the final pair in.
#
# Workflow:
#   1. Pick a font you want to preview from either list below.
#   2. Download the .woff2 weights listed in `files:` (see
#      fonts/README.md for the easy way via google-webfonts-helper).
#   3. Drop the files into `fonts/<slug>/` keeping the
#      exact filenames listed below.
#   4. Refresh the site — that font appears in the pulldown.
#
# Fonts whose files are missing still appear in the pulldown
# but selecting them falls back to the system stack.
#
# Filename convention: `{slug}-{weight}{-italic?}.woff2`
#   e.g.  fraunces-700.woff2
#         fraunces-600-italic.woff2
#         inter-500.woff2
# ---------------------------------------------------------

title_fonts:
  - family: Fraunces
    slug: fraunces
    type: serif
    fallback: 'ui-serif, Georgia, serif'
    google: https://fonts.google.com/specimen/Fraunces
    default: true
    files:
      - { weight: 500, style: normal, file: fraunces-500.woff2 }
      - { weight: 600, style: italic, file: fraunces-600-italic.woff2 }
      - { weight: 700, style: normal, file: fraunces-700.woff2 }
      - { weight: 800, style: normal, file: fraunces-800.woff2 }
      - { weight: 900, style: normal, file: fraunces-900.woff2 }

